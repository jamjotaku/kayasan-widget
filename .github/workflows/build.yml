name: Build Electron App

# ★ここを修正：自動実行をやめて、手動実行(workflow_dispatch)にする
on:
  workflow_dispatch: # これを入れると、GitHub上でボタンが出現します

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/widget
    
    # ...（以下、手順は今のままでOK）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # キャッシュも widget 内の package-lock.json を見るように修正
          cache-dependency-path: apps/widget/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Build Electron App
        run: npx electron-builder --win portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kaya-Widget-EXE
          path: apps/widget/dist/*.exe # ★パスを修正