name: Deploy Web Content

on:
  push:
    branches: [ main ]
    # widget フォルダ内のコードが変更された時だけ実行
    paths:
      - 'apps/widget/**'
      - '.github/workflows/deploy-web.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/widget

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/widget/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build
        # Next.js の静的書き出し(outフォルダ)を作成

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # apps/widget/out フォルダをアップロード
          path: apps/widget/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4